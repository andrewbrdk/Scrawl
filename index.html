<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Scrawl</title>
	<link rel="stylesheet" href="/style.css">
	<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.bubble.css" rel="stylesheet" />
	<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body>
	
<x-main></x-main>

<script>
class XMain extends HTMLElement {
	#login = null;
	#scrawl = null;
	
	constructor() {
		super();
		this.innerHTML = `
			<x-login></x-login>
			<x-scrawl></x-scrawl>
		`;
		this.#scrawl = this.querySelector('x-scrawl');
		this.#login = this.querySelector('x-login');
		this.#login.hidden = true;
		this.#scrawl.hidden = true;
		this.addEventListener('loginsuccess', (e) => {
			this.renderPage();
		});
		this.renderPage();
	}

	async renderPage() {
		let res = await fetch('/pages');
		const statusCode = res.status;
		if (statusCode == 200) {
			this.#scrawl.hidden = false;
			this.#login.hidden = true;
			let p = await res.json();
			this.#scrawl.init(p);
		} else if (statusCode == 401) { // unauthorized
			this.#login.hidden = false;
			this.#scrawl.hidden = true;
		} else {
			this.#scrawl.hidden = true;
		}
	}
}

class XLogin extends HTMLElement {
	constructor() {
		super();
		this.innerHTML = `
			<h1>Scrawl</h1>
			<form>
				<label for="password">Password:</label>
				<input type="password" id="password" name="password" required>
				<button type="button">Login</button>
				<br/>
				<div id="invalidpassword" style="display: none;">Invalid Password</div>
			</form>
		`;
		this.querySelector('form').onsubmit = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
		this.querySelector('button').onclick = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
	}

	async submitLogin() {
		const password = this.querySelector('#password').value;
		const response = await fetch('/login', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			credentials: 'include',
			body: JSON.stringify({ password }),
		});
		if (response.ok) {
			this.querySelector('#invalidpassword').style.display = "none";
			this.dispatchEvent(new CustomEvent('loginsuccess', { bubbles: true }));
		} else {
			this.querySelector('#invalidpassword').style.display = "inline";
			setTimeout(() => {this.querySelector('#invalidpassword').style.display = "none";}, 3000);
		}
	}
}

class XScrawl extends HTMLElement {
	#aside = null;
	#nbselect = null;
	#nblabel = null;
	#nbmenu = null;
	#ulpages = null;
	#pagetitle = null;
	#editor = null;
	#quill = null;
	#notebooks = {};
	#currentNotebookId = null;
	#selected = null;
	#expanded = {};
	#resizer = null;
	#isResizing = false;
	#resizingStartX = 0;
	#resizingStartWidth = 0;
	#sidebarDefaultWidth = "15%";
	#sidebarMinWidth = 120; //todo: css 
	#collapseEdgeThreshold = 30;

	constructor() {
		super();
		this.innerHTML = `
			<aside>
				<div id="nbselect">
					<div id="nbcurrent">
						<span id="nblabel"></span>
						<span id="nbarrow">▾</span>
					</div>
					<ul id="nbmenu" class="hidden"></ul>
				</div>
				<ul id="pages"></ul>
				<button id="newpage">＋</button>
			</aside>
			<div id="sidebar-control">
				<div class="resizer"></div>
			</div>
			<div id="content">
				<div class="content-header">
					<input id="pagetitle" type="text">
				</div>
				<div id="editor"></div>
			</div>`;
		this.#aside = this.querySelector('aside');
		this.#nbselect = this.querySelector('#nbselect');
		this.#nblabel = this.querySelector('#nblabel');
		this.#nbmenu = this.querySelector('#nbmenu');
		this.#ulpages = this.querySelector('#pages');
		this.#pagetitle = this.querySelector('#pagetitle');
		this.#editor = this.querySelector('#editor');
		this.#resizer = this.querySelector(".resizer");

		if (!this.#quill) {
            this.#quill = new Quill(this.#editor, {
				modules: {
					toolbar: [
						['bold', 'italic', 'underline'],
						['image'],
						['code-block'],
						['clean']
					]
				},
                theme: "bubble"
            });
			//todo: move to bindEvents()
			let saveTimer = null;
			this.#quill.on("text-change", () => {
				clearTimeout(saveTimer);
				saveTimer = setTimeout(() => this.savePage(), 500);
			});
			//todo: slows down
			this.shiftQuillTooltip();
        }
	}

	async init(notebooks) {
		this.#notebooks = notebooks;
		//todo: select last opened notebook and page
		const ids = Object.keys(notebooks);
		this.#currentNotebookId = ids.length ? Number(ids[0]) : null;
		this.#selected = notebooks[this.#currentNotebookId]?.pages.length > 0 ? notebooks[this.#currentNotebookId].pages[0].id : null;
		await this.render();
	}

	getCurrentNotebook() {
		return this.#notebooks?.[this.#currentNotebookId] ?? null;
	}

	async render() {
		this.populateNotebookSelector();
		this.updatePages();
		//todo: move to separate method
		const addBtn = this.querySelector("#newpage");
		if (this.#currentNotebookId) {
			addBtn.classList.remove("hidden");
		} else {
			addBtn.classList.add("hidden");
		}
		this.bindEvents();
		//todo: handle empty notebooks
		this.updateTitle();
		this.updateEditor();
	}

	populateNotebookSelector() {
		const entries = Object.entries(this.#notebooks);
		if (!entries.length) {
			this.#nblabel.textContent = "Create notebook";
			this.#nbmenu.replaceChildren();
			this.#nbmenu.classList.add("hidden");
			this.#nbselect.classList.add("single");
			return;
		}

		this.#nbselect.classList.remove("single");
		this.#nbmenu.replaceChildren();
		for (const [id, nb] of entries) {
			const li = document.createElement("li");
			li.textContent = nb.name;
			li.dataset.id = id;
			if (Number(id) === this.#currentNotebookId) {
				this.#nblabel.textContent = nb.name;
			}
			this.#nbmenu.appendChild(li);
		}

		const separator = document.createElement("li");
		separator.classList.add("separator");
		this.#nbmenu.appendChild(separator);

		const actions = [
			{ text: "Create notebook", action: "create" },
			{ text: "Rename", action: "rename" },
			{ text: "Delete", action: "delete" },
		];
		for (const a of actions) {
			const li = document.createElement("li");
			li.textContent = a.text;
			li.dataset.action = a.action;
			li.classList.add("action")
			this.#nbmenu.appendChild(li);
		}
	}

	async updatePages() {
		const currentNotebook = this.getCurrentNotebook();
		if (!currentNotebook) return;
		this.#ulpages.innerHTML = "";
		const addPageList = (pages, depth=0) => {
			pages.forEach(page => {
				const li = document.createElement("li");
				li.dataset.id = page.id;
				li.dataset.depth = depth;
				li.dataset.haschildren = (page.children && page.children.length > 0);

				const isSelected = (page.id === this.#selected ? "selected" : "");
				const hasChildren = page.children && page.children.length > 0;
				//todo: simplify
				const collapseSymbol = "›";
				const collapseHidden = hasChildren ? "" : "hide"; //todo: rename
				const expanded = this.#expanded?.[page.id];
				const collapseClass = expanded ? "expanded" : "";

				li.innerHTML = `
					<div class="page-row ${isSelected}" data-depth="${depth}">
						<div class="left">
							<button class="collapse ${collapseHidden} ${collapseClass}">${collapseSymbol}</button>
							<span class="title">${escapeHTML(page.title)}</span>
						</div>
						<div class="right">
							<button class="addchild">＋</button>
							<button class="delete">✕</button>
						</div>
					</div>
				`;
				const wrapper = li.firstElementChild;
        		wrapper.style.setProperty('--depth', String(depth));

				this.#ulpages.appendChild(li);
				if (hasChildren && expanded) {
					addPageList(page.children, depth+1);
				}
			});
		};
		addPageList(currentNotebook.pages, 0);
	}

	collapseSidebar() {
		this.#aside.classList.add("hidden");
		this.#aside.style.width = "0px";
		this.#resizer.classList.add("sidebar-collapsed");
	}

	expandSidebar() {
		this.#aside.classList.remove("hidden");
		this.#aside.style.width = this.#sidebarDefaultWidth;
		this.#resizer.classList.remove("sidebar-collapsed");
	}

	bindEvents() {
		this.unbindEvents();

		this.querySelector("#nbcurrent").onclick = async (e) => {
			e.stopPropagation();
			if (this.#nbselect.classList.contains("single")) {
				await this.createNotebook();
				return;
			}
			this.#nbmenu.classList.toggle("hidden");
		};

		this.#nbmenu.onclick = async (e) => {
			const li = e.target.closest("li");
			if (!li) return;
			this.#nbmenu.classList.add("hidden");

			if (li.dataset.id) {
				const id = Number(li.dataset.id);
				if (id === this.#currentNotebookId) return;
				this.savePage();
				this.#currentNotebookId = id;
				this.#expanded = {};
				this.#selected = this.getCurrentNotebook()?.pages?.[0]?.id ?? null;
				this.render();
				return;
			}
			if (li.dataset.action == "create") {
				await this.createNotebook();
			} else if (li.dataset.action == "rename") {
				await this.renameNotebook();
			} else if (li.dataset.action == "delete") {
				await this.deleteNotebook();
			}
		};
		document.onclick = () => {
			this.#nbmenu.classList.add("hidden");
		};


		this.#resizer.onmousedown = (e) => {
			if (this.#aside.classList.contains("hidden")) {
				this.expandSidebar();
				return;
			}
			this.#isResizing = true;
			this.#resizingStartX = e.clientX;
			this.#resizingStartWidth = parseInt(window.getComputedStyle(this.#aside).width, 10);
			document.body.style.userSelect = "none";
		};
		this.onmousemove = (e) => {
			if (!this.#isResizing) return;
			const delta = e.clientX - this.#resizingStartX;
			const newWidth = this.#resizingStartWidth + delta;
			const nearLeftEdge = e.clientX <= this.#collapseEdgeThreshold;
			if (newWidth <= this.#sidebarMinWidth && nearLeftEdge) {
				this.collapseSidebar();
				this.#isResizing = false;
				document.body.style.userSelect = "";
				return;
			}
			if (newWidth > this.#sidebarMinWidth) {
				this.#aside.style.width = newWidth + "px";
			} else {
				this.#aside.style.width = this.#sidebarMinWidth + "px";
			}
		};
		this.onmouseup = () => {
			if (this.#isResizing) {
				this.#isResizing = false;
				this.#resizingStartX = 0;
				this.#resizingStartWidth = 0;
				document.body.style.userSelect = "";
			}
		};
		
		this.querySelector("#newpage").onclick = () => {
			this.createPage("New Page", this.#currentNotebookId, null);
		};

		this.querySelectorAll("#pages li").forEach(li => {
			//todo: avoid string-int conversion
			const id = parseInt(li.dataset.id, 10);
        	li.onclick = () => {
				this.savePage();
				if (this.#selected == id && li.dataset.haschildren) {
					if (id in this.#expanded) {
						delete this.#expanded[id];
					} else {
						this.#expanded[id] = true;
					}
				}
				this.#selected = id;
				this.render();
			};
			li.querySelector(".delete").onclick = async (e) => {
				e.stopPropagation();
				await this.deletePage(id);
			};
			li.querySelector(".addchild").onclick = (e) => {
				e.stopPropagation();
				this.createPage("New Page", this.#currentNotebookId, id);
			};
			li.querySelector(".collapse").onclick = (e) => {
				e.stopPropagation();
				if (id in this.#expanded) {
					delete this.#expanded[id];
				} else {
					this.#expanded[id] = true;
				}
				this.#selected = id;
				this.render();
			};
		});

		let renameTimer = null;
		this.#pagetitle.oninput = () => {
			clearTimeout(renameTimer);
			renameTimer = setTimeout(() => {this.saveTitleChange();}, 400);
		};
	}
	
	unbindEvents() {
		this.onclick = null;
		this.querySelectorAll('button').forEach(btn => btn.onclick = null);
		this.querySelectorAll("aside li").forEach(li => li.onclick = null);
	}

	shiftQuillTooltip() {
		const tooltip = this.#editor.querySelector('.ql-tooltip');
		//todo: shift arrow position
		if (!tooltip) return;
		//todo: slows down 
		const observer = new MutationObserver(() => {
			const tooltipRect = tooltip.getBoundingClientRect();
			const editorRect = this.#editor.getBoundingClientRect();
			let left = parseFloat(tooltip.style.left || 0);
			if (tooltipRect.left < editorRect.left) {
				left += editorRect.left - tooltipRect.left;
			} 
			else if (tooltipRect.right > editorRect.right) {
				left -= tooltipRect.right - editorRect.right;
			}
			tooltip.style.left = left + "px";
		});
		observer.observe(tooltip, { attributes: true, attributeFilter: ['style'] });
	}

	updateTitle() {
		this.#pagetitle.value = this.getPageTitleById(this.#selected) ?? "";
	}

	getPageTitleById(id, pages=null) {
		if (!id) return null;
		if (pages === null) pages = this.getCurrentNotebook()?.pages;
		for (const page of pages) {
			if (page.id === id) return page.title;
			if (page.children && page.children.length > 0) {
				const title = this.getPageTitleById(id, page.children);
				if (title) return title;
			}
		}
		return null;
	}

	async updateEditor() {
        if (!this.#selected) return;
		const res = await fetch('/page?id=' + encodeURIComponent(this.#selected));
		if (res.ok) {
			const data = await res.json();
			this.#quill.setContents(data.delta);
		} else {
			this.#quill.setText('');
		}
    }

	async savePage() {
		if (!this.#selected) return;
		const delta = this.#quill.getContents();
		const res = await fetch('/save', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({id: this.#selected, delta: delta})
		});
		if (!res.ok) {
			console.error("Failed to auto-save page:", this.#selected);
		}
	}

	async createPage(title, notebookId, parentId) {
		const res = await fetch('/create', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ title: title, notebook: notebookId || 1, parent: parentId || 0 })
		});
		if (!res.ok) {
			console.error("Failed to create page");
			return;
		}
		const data = await res.json();
		if (parentId) this.#expanded[parentId] = true;
		this.#notebooks = data.notebooks;
		this.#selected = data.id;
		await this.render();
	}

	async deletePage(id) {
		if (!confirm(`Delete page "${this.getPageTitleById(id)}"?`)) return;
		const res = await fetch('/delete', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ id }),
		});
		if (!res.ok) {
			console.error("Failed to delete page");
			return;
		}
		const data = await res.json();
		this.#notebooks = data;
		this.#selected = null;
		await this.render();
	}

	async saveTitleChange() {
		const newTitle = this.#pagetitle.value.trim();
		const oldTitle = this.getPageTitleById(this.#selected);
		if (!newTitle || newTitle === oldTitle) return;
		
		const res = await fetch('/rename', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ id: this.#selected, title: newTitle })
		});
		if (!res.ok) {
			console.error("Rename failed");
			this.#pagetitle.value = oldTitle;
			return;
		}
		const data = await res.json();
		this.#notebooks = data;
		this.render();
	}

	async createNotebook() {
		const res = await fetch("/notebooks/create", { method: "POST" });
		if (!res.ok) {
			alert("Failed to create notebook");
			return;
		}
		const data = await res.json();
		this.#notebooks = data.notebooks;
		this.#currentNotebookId = data.id;
		this.#expanded = {};
		this.#selected = null;
		this.render();
	}

	async renameNotebook() {
		if (!this.#currentNotebookId) return;
		const oldName = this.#notebooks[this.#currentNotebookId].name;
		const name = prompt("Rename notebook:", oldName);
		if (!name || name === oldName) return;
		const res = await fetch("/notebooks/rename", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify({ id: this.#currentNotebookId, name: name })
		});
		if (!res.ok) return;
		const data = await res.json();
		this.#notebooks = data;
		this.render();
	}

	async deleteNotebook() {
		if (!this.#currentNotebookId) return;
		const name = this.#notebooks[this.#currentNotebookId].name;
		if (!confirm(`Delete notebook "${name}"?`)) return;
		const res = await fetch("/notebooks/delete", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify({ id: this.#currentNotebookId })
		});
		if (!res.ok) return;
		const data = await res.json();
		this.#notebooks = data;
		//todo: select last opened notebook
		this.#currentNotebookId = Object.keys(this.#notebooks)[0]
			? Number(Object.keys(this.#notebooks)[0])
			: null;
		this.#selected = null;
		this.#expanded = {};
		this.render();
	}
}

function escapeHTML(str) {
	const div = document.createElement('div');
	div.textContent = str;
	return div.innerHTML;
}

customElements.define('x-main', XMain);
customElements.define('x-login', XLogin);
customElements.define('x-scrawl', XScrawl);

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Scrawl</title>
	<link rel="stylesheet" href="/style.css">
	<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
	<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
</head>
<body>
	
<x-main></x-main>

<script>
class XMain extends HTMLElement {
	#login = null;
	#scrawl = null;
	
	constructor() {
		super();
		this.innerHTML = `
			<x-login></x-login>
			<x-scrawl></x-scrawl>
		`;
		this.#scrawl = this.querySelector('x-scrawl');
		this.#login = this.querySelector('x-login');
		this.#login.hidden = true;
		this.#scrawl.hidden = true;
		this.addEventListener('loginsuccess', (e) => {
			this.renderPage();
		});
		this.renderPage();
	}

	async renderPage() {
		let res = await fetch('/pages');
		const statusCode = res.status;
		if (statusCode == 200) {
			this.#scrawl.hidden = false;
			this.#login.hidden = true;
			let p = await res.json();
			this.#scrawl.init(p);
		} else if (statusCode == 401) { // unauthorized
			this.#login.hidden = false;
			this.#scrawl.hidden = true;
		} else {
			this.#scrawl.hidden = true;
		}
	}
}

class XLogin extends HTMLElement {
	constructor() {
		super();
		this.innerHTML = `
			<h1>Scrawl</h1>
			<form>
				<label for="password">Password:</label>
				<input type="password" id="password" name="password" required>
				<button type="button">Login</button>
				<br/>
				<div id="invalidpassword" style="display: none;">Invalid Password</div>
			</form>
		`;
		this.querySelector('form').onsubmit = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
		this.querySelector('button').onclick = (e) => {
			e.preventDefault();
			this.submitLogin();
		};
	}

	async submitLogin() {
		const password = this.querySelector('#password').value;
		const response = await fetch('/login', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			credentials: 'include',
			body: JSON.stringify({ password }),
		});
		if (response.ok) {
			this.querySelector('#invalidpassword').style.display = "none";
			this.dispatchEvent(new CustomEvent('loginsuccess', { bubbles: true }));
		} else {
			this.querySelector('#invalidpassword').style.display = "inline";
			setTimeout(() => {this.querySelector('#invalidpassword').style.display = "none";}, 3000);
		}
	}
}

class XScrawl extends HTMLElement {
	#aside = null;
	#ul = null;
	#editor = null;
	#quill = null;
	#pages = null;
	#selected = null;

	getDisplayedState() {
		return {};
	}

	constructor() {
		super();
		this.innerHTML = `
			<aside><ul></ul></aside>
			<div id="editor"></div>`;
		this.#aside = this.querySelector('aside');
		this.#ul = this.querySelector('ul');
		this.#editor = this.querySelector('#editor');
		if (!this.#quill) {
            this.#quill = new Quill(this.#editor, {
				modules: {
        			toolbar: false
    			},
                theme: "snow"
            });
        }
	}

	async init(p) {
		this.#pages = p.pages;
		this.#selected = p.selected;
		await this.render();
	}

	async render() {
		this.updatePages();
		this.bindEvents();
		this.updateEditor();
	}

	async updatePages() {
		this.#ul.innerHTML = "";
		if (!this.#pages) return;
		this.#pages.forEach(page => {
			const li = document.createElement("li");
			li.textContent = page;
			if (page === this.#selected) {
				li.classList.add("selected");
			}
			this.#ul.appendChild(li);
		});
	}

	bindEvents() {
		this.unbindEvents();

		this.querySelectorAll("aside li").forEach(li => {
        	li.onclick = () => {
				const page = li.textContent;
				this.#selected = page;
				this.render();
			};
		});
	}
	
	unbindEvents() {
		this.onclick = null;
		this.querySelectorAll('button').forEach(btn => btn.onclick = null);
		this.querySelectorAll("aside li").forEach(li => li.onclick = null);
	}

	async updateEditor() {
        if (!this.#selected) return;
		const res = await fetch('/page?name=' + encodeURIComponent(this.#selected));
		if (res.ok) {
			const data = await res.json();
			this.#quill.setText(data.content || '');
		} else {
			this.#quill.setText('');
		}
    }
}

function escapeHTML(str) {
	const div = document.createElement('div');
	div.textContent = str;
	return div.innerHTML;
}

customElements.define('x-main', XMain);
customElements.define('x-login', XLogin);
customElements.define('x-scrawl', XScrawl);

</script>
</body>
</html>
